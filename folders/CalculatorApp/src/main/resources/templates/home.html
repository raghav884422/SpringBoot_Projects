<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional Calculator</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI", sans-serif;
}

.calculator-card {
    background: #ffffff;
    padding: 30px 35px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.calculator-card h1 {
    text-align: center;
    color: #2c5364;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 18px;
}

label {
    font-weight: 600;
    color: #444;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 15px;
    transition: 0.3s;
}

input:focus {
    border-color: #2c5364;
    box-shadow: 0 0 5px rgba(44,83,100,0.4);
}

.buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 15px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.add { background: #4CAF50; }
.sub { background: #f39c12; }
.mul { background: #3498db; }
.div { background: #e74c3c; }

.footer {
    text-align: center;
    margin-top: 20px;
    color: #888;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="calculator-card">
    <h1>Calculator</h1>

    <form action="/api/calculate" method="POST">

        <div class="form-group">
            <label>Number 1</label>
            <input type="number" name="num1" required>
        </div>

        <div class="form-group">
            <label>Number 2</label>
            <input type="number" name="num2" required>
        </div>

        <div class="buttons">
            <button class="add" type="submit" name="operation" value="add">Add</button>
            <button class="sub" type="submit" name="operation" value="sub">Subtract</button>
            <button class="mul" type="submit" name="operation" value="mul">Multiply</button>
            <button class="div" type="submit" name="operation" value="div">Divide</button>
        </div>

    </form>

    <div class="footer">
        © 2026 Professional Calculator
    </div>
</div>

</body>
</html>
